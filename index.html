<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>گالری طلای سپهری | Sepehri Gold</title>
    
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel for Browser Compilation -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;400;700;900&display=swap');
        body {
            font-family: 'Vazirmatn', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#F4F5F7] text-right select-none">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Firebase Scripts Loading ---
        // Note: Using dynamic imports for Firebase in a single HTML file
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

        // IMPORTANT: Replace with your actual Firebase config
        const firebaseConfig = {
            apiKey: "",
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const APP_ID = "sepehri-gold-v5-fixed";

        // Lucide Icon Component Wrapper
        const Icon = ({ name, size = 20, className = "", ...props }) => {
            const LucideIcon = lucide.icons[name];
            return LucideIcon ? <LucideIcon size={size} className={className} {...props} /> : null;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('home'); 
            const [products, setProducts] = useState([]);
            const [allMessages, setAllMessages] = useState([]);
            const [activeChatId, setActiveChatId] = useState(null);
            const [replyTo, setReplyTo] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [adminPass, setAdminPass] = useState('');
            const [showLogin, setShowLogin] = useState(false);
            const [contactModal, setContactModal] = useState(null);
            const [prices, setPrices] = useState({
                gold18k: 4450000, 
                gold24k: 5933000,
                coinEmami: 54200000,
                lastUpdate: new Date().toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' })
            });

            const chatEndRef = useRef(null);
            const shopAddress = "تهران، بازار بزرگ، راسته زرگرها، پلاک ۴۵، گالری طلای سپهری";

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    if (currentUser) {
                        setUser(currentUser);
                    } else {
                        signInAnonymously(auth);
                    }
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;

                const unsubProd = onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', 'products'), (snapshot) => {
                    const p = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    setProducts(p.sort((a, b) => (b.isPinned ? 1 : -1) - (a.isPinned ? 1 : -1) || (b.timestamp || 0) - (a.timestamp || 0)));
                });

                const unsubMsg = onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', 'messages'), (snapshot) => {
                    const m = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    setAllMessages(m.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0)));
                });

                return () => { unsubProd(); unsubMsg(); };
            }, [user]);

            useEffect(() => {
                const interval = setInterval(() => {
                    setPrices(prev => ({
                        ...prev,
                        gold18k: prev.gold18k + Math.floor(Math.random() * 4000 - 2000),
                        lastUpdate: new Date().toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit' })
                    }));
                }, 60000);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [allMessages, activeChatId, view]);

            const handleCopy = (phone) => {
                const el = document.createElement('textarea');
                el.value = phone;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setContactModal(phone);
            };

            const addProduct = async (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const code = "GS-" + Math.floor(1000 + Math.random() * 9000);
                await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'products'), {
                    name: fd.get('name'), 
                    price: Number(fd.get('price')), 
                    phone: fd.get('phone'),
                    weight: fd.get('weight'),
                    description: fd.get('description'),
                    image: e.target.imgData?.value || '', 
                    code, 
                    isPinned: false,
                    timestamp: Date.now()
                });
                e.target.reset();
            };

            const sendMessage = async (e) => {
                e.preventDefault();
                const text = e.target.msg.value;
                if (!text || !user) return;
                const cid = isAdmin ? activeChatId : user.uid;
                await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'messages'), {
                    chatId: cid, 
                    sender: user.uid, 
                    text, 
                    timestamp: Date.now(), 
                    isAdmin: isAdmin,
                    replyTo: replyTo ? { text: replyTo.text, id: replyTo.id } : null
                });
                e.target.reset();
                setReplyTo(null);
            };

            const formatPrice = (n) => Number(n).toLocaleString('fa-IR');

            const validMessages = allMessages.filter(m => m && m.chatId);
            const chatList = Array.from(new Set(validMessages.map(m => m.chatId))).map(id => ({
                id, last: validMessages.filter(m => m.chatId === id).pop()
            }));

            const currentMsgs = allMessages.filter(m => m.chatId === (isAdmin ? activeChatId : user?.uid));

            return (
                <div className="min-h-screen pb-32">
                    {/* Header */}
                    <nav className="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b p-4 flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-2">
                            <div className="bg-yellow-500 p-2 rounded-xl shadow-lg shadow-yellow-200">
                                <Icon name="Sparkles" className="text-white" size={18} />
                            </div>
                            <div>
                                <h1 className="font-black text-gray-900 leading-tight">طلای سپهری</h1>
                                <span className="text-[9px] text-green-600 font-bold uppercase tracking-tighter">آپدیت زنده: {prices.lastUpdate}</span>
                            </div>
                        </div>
                        {!isAdmin && (
                            <button onClick={() => { setActiveChatId(user?.uid); setView('chat-room'); }} className="bg-gray-900 text-white px-4 py-2 rounded-full flex items-center gap-2 text-xs font-bold active:scale-95 transition-all">
                                <Icon name="MessageCircle" size={16} /> پشتیبانی
                            </button>
                        )}
                    </nav>

                    <main className="max-w-xl mx-auto p-4 space-y-6 animate-fade-in">
                        {view === 'home' && (
                            <div className="space-y-6">
                                {/* Price Card */}
                                <div className="bg-gray-900 rounded-[2.5rem] p-6 text-white shadow-xl relative overflow-hidden">
                                    <div className="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
                                        <h2 className="text-xs font-black text-yellow-500 flex items-center gap-2 tracking-widest"><Icon name="BarChart3" size={14}/> نرخ لحظه‌ای بازار</h2>
                                    </div>
                                    <div className="space-y-4">
                                        <div className="flex justify-between items-end">
                                            <span className="text-[11px] text-gray-400">۱۸ عیار (گرم)</span>
                                            <span className="text-2xl font-black">{formatPrice(prices.gold18k)} <small className="text-[10px] opacity-40">تومان</small></span>
                                        </div>
                                        <div className="flex justify-between items-end bg-white/5 p-4 rounded-3xl">
                                            <span className="text-[11px] text-yellow-500">سکه تمام امامی</span>
                                            <span className="text-2xl font-black">{formatPrice(prices.coinEmami)} <small className="text-[10px] opacity-40">تومان</small></span>
                                        </div>
                                    </div>
                                </div>

                                {/* Products */}
                                <div className="space-y-4">
                                    {products.map(p => (
                                        <div key={p.id} className="bg-white rounded-[2rem] p-4 border shadow-sm flex flex-col gap-4">
                                            <div className="flex gap-4">
                                                <img src={p.image || 'https://via.placeholder.com/100'} className="w-24 h-24 rounded-3xl object-cover bg-gray-50" />
                                                <div className="flex-1 flex flex-col justify-between py-1">
                                                    <div>
                                                        <div className="flex justify-between">
                                                            <span className="text-[9px] font-bold text-gray-400">{p.code}</span>
                                                            <span className="text-[10px] font-bold text-gray-600 bg-gray-100 px-2 py-0.5 rounded-lg">{p.weight} گرم</span>
                                                        </div>
                                                        <h3 className="font-black text-gray-800 mt-1">{p.name}</h3>
                                                        <div className="text-yellow-600 font-black text-lg mt-1">{formatPrice(p.price)} <span className="text-[10px]">تومان</span></div>
                                                    </div>
                                                    <button onClick={() => handleCopy(p.phone)} className="w-full bg-gray-900 text-white py-2 rounded-xl text-[11px] font-black flex justify-center items-center gap-2">
                                                        <Icon name="Copy" size={14}/> تماس و خرید
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'admin-panel' && isAdmin && (
                            <div className="space-y-6">
                                <div className="bg-white p-6 rounded-[2.5rem] shadow-lg border">
                                    <h2 className="font-black mb-4 flex items-center gap-2"><Icon name="Plus" className="text-yellow-600"/> افزودن کالا</h2>
                                    <form onSubmit={addProduct} className="space-y-3">
                                        <input type="file" accept="image/*" onChange={(e) => {
                                            const reader = new FileReader();
                                            reader.onload = (f) => document.getElementById('imgData').value = f.target.result;
                                            reader.readAsDataURL(e.target.files[0]);
                                        }} className="text-xs" />
                                        <input id="imgData" type="hidden" />
                                        <input name="name" placeholder="نام محصول" className="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold text-sm" required />
                                        <div className="grid grid-cols-2 gap-2">
                                            <input name="price" type="number" placeholder="قیمت" className="p-4 bg-gray-50 rounded-2xl outline-none font-bold text-sm" required />
                                            <input name="weight" placeholder="وزن" className="p-4 bg-gray-50 rounded-2xl outline-none font-bold text-sm" required />
                                        </div>
                                        <input name="phone" placeholder="شماره تماس" className="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold text-sm" required />
                                        <button className="w-full bg-yellow-600 text-white py-4 rounded-2xl font-black">انتشار در ویترین</button>
                                    </form>
                                </div>

                                <div className="space-y-3">
                                    <h3 className="text-xs font-black text-gray-400 px-2">پیام‌های مشتریان</h3>
                                    {chatList.map(c => (
                                        <button key={c.id} onClick={() => { setActiveChatId(c.id); setView('chat-room'); }} className="w-full bg-white p-4 rounded-3xl flex items-center gap-4 border shadow-sm">
                                            <div className="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-gray-400"><Icon name="User" /></div>
                                            <div className="flex-1 text-right">
                                                <div className="font-black text-xs">مشتری {c.id.slice(0, 5)}</div>
                                                <p className="text-[10px] text-gray-400 truncate">{c.last?.text}</p>
                                            </div>
                                            <div className="w-2 h-2 bg-yellow-500 rounded-full"></div>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'chat-room' && (
                            <div className="h-[75vh] flex flex-col bg-white rounded-[2.5rem] shadow-xl overflow-hidden border">
                                <div className="p-4 border-b flex items-center gap-3">
                                    <button onClick={() => setView(isAdmin ? 'admin-panel' : 'home')} className="p-2 bg-gray-100 rounded-xl"><Icon name="ChevronLeft" className="rotate-180" /></button>
                                    <div className="font-black text-sm">پشتیبانی آنلاین سپهری</div>
                                </div>
                                <div className="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50 no-scrollbar">
                                    {currentMsgs.map(m => (
                                        <div key={m.id} className={`flex flex-col ${m.isAdmin ? 'items-end' : 'items-start'}`}>
                                            <div className={`max-w-[80%] p-4 rounded-3xl text-sm font-bold shadow-sm ${m.isAdmin ? 'bg-gray-800 text-white rounded-tr-none' : 'bg-white text-gray-800 rounded-tl-none'}`}>
                                                {m.text}
                                            </div>
                                        </div>
                                    ))}
                                    <div ref={chatEndRef} />
                                </div>
                                <form onSubmit={sendMessage} className="p-3 border-t flex gap-2">
                                    <input name="msg" placeholder="پیام شما..." className="flex-1 bg-gray-100 p-3 rounded-2xl outline-none text-sm font-bold" />
                                    <button className="bg-gray-900 text-white p-3 rounded-2xl"><Icon name="Send" /></button>
                                </form>
                            </div>
                        )}
                    </main>

                    {/* Footer Nav */}
                    <div className="fixed bottom-6 left-6 right-6 z-40 bg-white/90 backdrop-blur-xl border rounded-[2rem] p-2 flex shadow-2xl">
                        <button onClick={() => setView('home')} className={`flex-1 flex flex-col items-center py-3 rounded-2xl transition-all ${view === 'home' ? 'bg-yellow-50 text-yellow-700 font-bold' : 'text-gray-400'}`}>
                            <Icon name="Home" />
                            <span className="text-[10px] mt-1">ویترین</span>
                        </button>
                        <button onClick={() => isAdmin ? setView('admin-panel') : setShowLogin(true)} className={`flex-1 flex flex-col items-center py-3 rounded-2xl transition-all ${view === 'admin-panel' || isAdmin ? 'bg-yellow-50 text-yellow-700 font-bold' : 'text-gray-400'}`}>
                            <Icon name="Settings" />
                            <span className="text-[10px] mt-1">مدیریت</span>
                        </button>
                    </div>

                    {/* Contact Modal */}
                    {contactModal && (
                        <div className="fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm flex items-center justify-center p-6">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-8 text-center animate-fade-in">
                                <div className="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="Check" size={32} /></div>
                                <h3 className="font-black text-xl mb-2">شما
